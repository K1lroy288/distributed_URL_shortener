global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'monitoring-service'

scrape_configs:
  - job_name: 'auth-service'
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['auth-service:8000']
        labels:
          service: 'auth-service'
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s
  
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s